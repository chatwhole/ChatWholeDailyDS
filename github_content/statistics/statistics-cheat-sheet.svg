<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400">
  <defs>
    <linearGradient id="statsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1400" fill="url(#statsBg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1000" height="80" fill="url(#headerGrad)"/>
  <text x="500" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">
    📊 Statistics Cheat Sheet
  </text>
  <text x="500" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">
    Complete Reference for Data Science
  </text>
  
  <!-- Section 1: Descriptive Statistics -->
  <rect x="20" y="100" width="470" height="300" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="255" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
    📈 Descriptive Statistics
  </text>
  
  <!-- Mean -->
  <text x="40" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Mean (μ)</text>
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ccc">μ = Σxᵢ / n</text>
  
  <!-- Median -->
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Median</text>
  <text x="40" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Middle value of sorted data</text>
  
  <!-- Mode -->
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Mode</text>
  <text x="40" y="285" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Most frequent value</text>
  
  <!-- Variance -->
  <text x="40" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Variance (σ²)</text>
  <text x="40" y="335" font-family="Arial, sans-serif" font-size="12" fill="#ccc">σ² = Σ(xᵢ - μ)² / n</text>
  
  <!-- Std Dev -->
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Std Deviation (σ)</text>
  <text x="40" y="385" font-family="Arial, sans-serif" font-size="12" fill="#ccc">σ = √σ²</text>
  
  <!-- Section 2: Probability -->
  <rect x="510" y="100" width="470" height="300" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="745" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
    🎲 Probability
  </text>
  
  <text x="530" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Normal Distribution</text>
  <text x="530" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ccc">f(x) = (1/σ√2π) * e^(-(x-μ)²/2σ²)</text>
  
  <text x="530" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">68-95-99.7 Rule</text>
  <text x="530" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ccc">68% within 1σ, 95% within 2σ</text>
  
  <text x="530" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Binomial</text>
  <text x="530" y="285" font-family="Arial, sans-serif" font-size="12" fill="#ccc">P(X=k) = C(n,k) * p^k * (1-p)^(n-k)</text>
  
  <text x="530" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Poisson</text>
  <text x="530" y="335" font-family="Arial, sans-serif" font-size="12" fill="#ccc">P(X=k) = (λ^k * e^-λ) / k!</text>
  
  <text x="530" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Bayes' Theorem</text>
  <text x="530" y="385" font-family="Arial, sans-serif" font-size="12" fill="#ccc">P(A|B) = P(B|A) * P(A) / P(B)</text>
  
  <!-- Section 3: Hypothesis Testing -->
  <rect x="20" y="420" width="470" height="320" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="255" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
    🔬 Hypothesis Testing
  </text>
  
  <text x="40" y="485" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Steps:</text>
  <text x="40" y="505" font-family="Arial, sans-serif" font-size="12" fill="#ccc">1. State H₀ and H₁</text>
  <text x="40" y="525" font-family="Arial, sans-serif" font-size="12" fill="#ccc">2. Choose α (0.05)</text>
  <text x="40" y="545" font-family="Arial, sans-serif" font-size="12" fill="#ccc">3. Calculate test statistic</text>
  <text x="40" y="565" font-family="Arial, sans-serif" font-size="12" fill="#ccc">4. Compare p-value to α</text>
  
  <text x="40" y="595" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">t-test:</text>
  <text x="40" y="615" font-family="Arial, sans-serif" font-size="12" fill="#ccc">t = (x̄ - μ) / (s/√n)</text>
  
  <text x="40" y="645" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">χ²-test:</text>
  <text x="40" y="665" font-family="Arial, sans-serif" font-size="12" fill="#ccc">χ² = Σ(O - E)² / E</text>
  
  <text x="40" y="695" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">ANOVA:</text>
  <text x="40" y="715" font-family="Arial, sans-serif" font-size="12" fill="#ccc">F = MSB / MSW</text>
  
  <!-- Section 4: Regression -->
  <rect x="510" y="420" width="470" height="320" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="745" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
    📉 Regression
  </text>
  
  <text x="530" y="485" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Simple Linear:</text>
  <text x="530" y="505" font-family="Arial, sans-serif" font-size="12" fill="#ccc">y = β₀ + β₁x + ε</text>
  
  <text x="530" y="535" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Multiple Regression:</text>
  <text x="530" y="555" font-family="Arial, sans-serif" font-size="12" fill="#ccc">y = β₀ + β₁x₁ + β₂x₂ + ... + ε</text>
  
  <text x="530" y="585" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">R² Score:</text>
  <text x="530" y="605" font-family="Arial, sans-serif" font-size="12" fill="#ccc">R² = SSR / SST (0 to 1)</text>
  
  <text x="530" y="635" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">RMSE:</text>
  <text x="530" y="655" font-family="Arial, sans-serif" font-size="12" fill="#ccc">√(Σ(y - ŷ)² / n)</text>
  
  <text x="530" y="685" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Correlation (r):</text>
  <text x="530" y="705" font-family="Arial, sans-serif" font-size="12" fill="#ccc">r = Σ(xᵢ-x̄)(yᵢ-ȳ) / √(Σ(xᵢ-x̄)² * Σ(yᵢ-ȳ)²)</text>
  
  <!-- Section 5: Common Formulas -->
  <rect x="20" y="760" width="960" height="280" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="500" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea">
    🧮 Quick Reference Formulas
  </text>
  
  <!-- Formula boxes -->
  <rect x="40" y="810" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="180" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Combinations</text>
  <text x="180" y="855" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">C(n,k) = n! / (k! * (n-k)!)</text>
  
  <rect x="360" y="810" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="500" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Permutations</text>
  <text x="500" y="855" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">P(n,k) = n! / (n-k)!</text>
  
  <rect x="680" y="810" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="820" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Expected Value</text>
  <text x="820" y="855" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">E(X) = Σ xᵢ * P(xᵢ)</text>
  
  <rect x="40" y="890" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="180" y="915" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Variance</text>
  <text x="180" y="935" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Var(X) = E(X²) - [E(X)]²</text>
  
  <rect x="360" y="890" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="500" y="915" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Covariance</text>
  <text x="500" y="935" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Cov(X,Y) = E[(X-μx)(Y-μy)]</text>
  
  <rect x="680" y="890" width="280" height="60" rx="5" fill="#1a1a2e"/>
  <text x="820" y="915" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">Confidence Interval</text>
  <text x="820" y="935" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">x̄ ± z * (σ/√n)</text>
  
  <!-- Footer -->
  <rect x="0" y="1320" width="1000" height="80" fill="url(#headerGrad)"/>
  <text x="500" y="1355" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff">
    📊 Statistics Cheat Sheet by ChatWhole.com
  </text>
  <text x="500" y="1380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">
    Visit https://chatwhole.com/statistics for full tutorials
  </text>
</svg>