<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="300" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="600" cy="50" r="60" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Main title -->
  <text x="600" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#textGrad)" filter="url(#shadow)">
    Data Science & AI
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e0e7ff">
    Complete Learning Hub with Visual Cheat Sheets
  </text>
  
  <!-- Decorative elements -->
  <rect x="450" y="250" width="300" height="4" rx="2" fill="#fff" opacity="0.8"/>
  
  <!-- Icons row -->
  <g transform="translate(300, 290)">
    <!-- Python icon -->
    <circle cx="50" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="50" y="38" text-anchor="middle" font-size="24" fill="#fff">🐍</text>
    
    <!-- Stats icon -->
    <circle cx="150" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="150" y="38" text-anchor="middle" font-size="24" fill="#fff">📊</text>
    
    <!-- ML icon -->
    <circle cx="250" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="250" y="38" text-anchor="middle" font-size="24" fill="#fff">🤖</text>
    
    <!-- DL icon -->
    <circle cx="350" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="350" y="38" text-anchor="middle" font-size="24" fill="#fff">🧠</text>
    
    <!-- SQL icon -->
    <circle cx="450" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="450" y="38" text-anchor="middle" font-size="24" fill="#fff">🗄️</text>
    
    <!-- Viz icon -->
    <circle cx="550" cy="30" r="25" fill="rgba(255,255,255,0.2)"/>
    <text x="550" y="38" text-anchor="middle" font-size="24" fill="#fff">📈</text>
  </g>
  
  <!-- Bottom text -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">
    by ChatWhole.com — Master Data Science Step by Step
  </text>
</svg>