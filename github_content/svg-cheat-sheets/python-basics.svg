<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#306998"/>
      <stop offset="100%" style="stop-color:#FFD43B"/>
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" rx="20" fill="#0d1117"/>
  
  <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#58a6ff">
    🐍 Python Basics
  </text>
  
  <rect x="20" y="70" width="260" height="200" rx="10" fill="#21262d"/>
  
  <text x="40" y="100" font-family="monospace" font-size="12" fill="#3fb950"># Variables</text>
  <text x="40" y="120" font-family="monospace" font-size="12" fill="#3fb950">name = "ChatWhole"</text>
  <text x="40" y="140" font-family="monospace" font-size="12" fill="#3fb950">age = 25</text>
  <text x="40" y="160" font-family="monospace" font-size="12" fill="#3fb950">height = 5.9</text>
  
  <text x="40" y="190" font-family="monospace" font-size="12" fill="#3fb950"># Lists</text>
  <text x="40" y="210" font-family="monospace" font-size="12" fill="#3fb950">fruits = ["apple",</text>
  <text x="40" y="230" font-family="monospace" font-size="12" fill="#3fb950">          "banana"]</text>
  
  <text x="40" y="260" font-family="monospace" font-size="12" fill="#3fb950">fruits.append("cherry")</text>
  
  <text x="150" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">
    ChatWhole.com
  </text>
</svg>