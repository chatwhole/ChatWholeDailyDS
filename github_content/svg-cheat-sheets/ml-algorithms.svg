<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="mlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" rx="20" fill="#0f0f23"/>
  
  <text x="150" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00d2ff">
    🤖 ML Algorithms
  </text>
  
  <rect x="20" y="70" width="260" height="200" rx="10" fill="#1e3a5f"/>
  
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ff88">Supervised:</text>
  <text x="40" y="120" font-family="monospace" font-size="11" fill="#ccc">• Linear Regression</text>
  <text x="40" y="140" font-family="monospace" font-size="11" fill="#ccc">• Logistic Regression</text>
  <text x="40" y="160" font-family="monospace" font-size="11" fill="#ccc">• Decision Tree</text>
